<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pear Assignment</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      overflow: hidden;
      background: #000;
    }

    #game_div {
      position: fixed;
      background: #000;
      overflow: hidden;
      outline: none;
      -webkit-user-drag: none;
    }

    #game_canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
      pointer-events: auto;
    }
  </style>
</head>

<body>
  <div id="game_div">
    <canvas id="game_canvas"></canvas>
  </div>
</body>

</html>
